<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background shadow -->
    <filter id="bgShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <!-- Inner card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Official Odoo purple -->
    <linearGradient id="purpleRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8F5B83"/>
      <stop offset="100%" stop-color="#714B67"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <g filter="url(#bgShadow)">
    <rect x="10" y="10" width="492" height="492" rx="78" fill="#ededed"/>
  </g>

  <!-- Inner card -->
  <g filter="url(#cardShadow)">
    <rect x="36" y="36" width="440" height="440" rx="62" fill="#f8f8f8"/>
  </g>

  <!-- Main ring -->
  <circle
    cx="256"
    cy="246"
    r="168"
    fill="none"
    stroke="url(#purpleRing)"
    stroke-width="44"
  />

  <!-- Official-style Odoo wordmark -->
  <!-- Uses lowercase, geometric spacing, official brand purple -->
  <text
    x="256"
    y="265"
    text-anchor="middle"
    font-family="'Montserrat', 'Avenir Next', Arial, sans-serif"
    font-size="110"
    font-weight="600"
    letter-spacing="-7"
  >
    <tspan fill="#714B67">O</tspan><tspan fill="#714B67">d</tspan><tspan fill="#714B67">o</tspan><tspan fill="#714B67">o</tspan>
  </text>

  <!-- Subtitle -->
  <text
    x="256"
    y="305"
    text-anchor="middle"
    font-family="monospace"
    font-size="18"
    font-weight="400"
    fill="#5c5c5c"
    letter-spacing="-0.7"
  >
    plugin to Cursor IDE
  </text>
</svg>